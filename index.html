<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <title>Registro de Desvios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body">

                <h4 class="mb-4">Registro de Desvios</h4>

                <form id="formDesvio">

                    <div class="mb-3">
                        <label>Data</label>
                        <input type="date" class="form-control" id="data">
                    </div>

                    <div class="mb-3">
                        <label>Identificado por</label>
                        <input type="text" class="form-control" id="identificadoPor">
                    </div>

                    <div class="mb-3">
                        <label>Função</label>
                        <input type="text" class="form-control" id="funcao">
                    </div>

                    <div class="mb-3">
                        <label>Origem</label>
                        <input type="text" class="form-control" id="origem">
                    </div>

                    <div class="mb-3">
                        <label>Responsável</label>
                        <input type="text" class="form-control" id="responsavel">
                    </div>

                    <div class="mb-3">
                        <label>Matrícula</label>
                        <input type="text" class="form-control" id="matricula">
                    </div>

                    <div class="mb-3">
                        <label>Área</label>
                        <input type="text" class="form-control" id="area">
                    </div>

                    <div class="mb-3">
                        <label>Tipo de Registro</label>
                        <input type="text" class="form-control" id="tipoRegistro">
                    </div>

                    <div class="mb-3">
                        <label>Descrição</label>
                        <textarea class="form-control" id="descricao"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Ação Corretiva</label>
                        <textarea class="form-control" id="acao"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Data Prevista</label>
                        <input type="date" class="form-control" id="dataPrevista">
                    </div>

                    <div class="mb-3">
                        <label>Data Realizada</label>
                        <input type="date" class="form-control" id="dataRealizada">
                    </div>

                    <button type="submit" class="btn btn-primary w-100" id="btnSalvar">Enviar</button>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script>

        const client = new Appwrite.Client()
            .setEndpoint('https://sfo.cloud.appwrite.io/v1')
            .setProject('69d6501c0033334abce4');

        const databases = new Appwrite.Databases(client);

        const DATABASE_ID = '69d68e020007f2bb948d';
        const COLLECTION_ID = 'registros';

        const campoData = document.getElementById('data');
        const campoPrevista = document.getElementById('dataPrevista');
        const campoRealizada = document.getElementById('dataRealizada');
        const btnSalvar = document.getElementById('btnSalvar');

        const hoje = new Date().toISOString().split('T')[0];

        // Define data atual apenas para o campo principal
        campoData.value = hoje;
        campoData.max = hoje;

        // SUBMIT
        document.getElementById('formDesvio').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = campoData.value;
            const prevista = campoPrevista.value;
            const realizada = campoRealizada.value;

            // VALIDAÇÃO

            if (data > hoje) {
                alert('Data não pode ser futura');
                return;
            }

            if (prevista && prevista < data) {
                alert('Data prevista não pode ser menor que a data');
                return;
            }

            if (realizada) {

                if (!prevista) {
                    alert('Preencha a data prevista antes');
                    return;
                }

                if (realizada > hoje) {
                    alert('Data realizada não pode ser futura');
                    return;
                }

                // REGRA PRINCIPAL
                if (realizada < prevista) {
                    alert('Data realizada deve ser maior ou igual à prevista');
                    return;
                }
            }

            try {
                btnSalvar.disabled = true;
                btnSalvar.innerText = 'Salvando...';

                await databases.createDocument(
                    DATABASE_ID,
                    COLLECTION_ID,
                    'unique()',
                    {
                        data: data,
                        identificado_por: document.getElementById('identificadoPor').value,
                        funcao: document.getElementById('funcao').value,
                        origem: document.getElementById('origem').value,
                        responsavel: document.getElementById('responsavel').value,
                        matricula: document.getElementById('matricula').value,
                        area: document.getElementById('area').value,
                        tipo_de_registro: document.getElementById('tipoRegistro').value,
                        descricao: document.getElementById('descricao').value,
                        acao_corretiva: document.getElementById('acao').value,
                        data_prevista: prevista,
                        data_realizada: realizada
                    }
                );

                alert('Registro salvo com sucesso');

                document.getElementById('formDesvio').reset();
                campoData.value = hoje;

            } catch (error) {
                alert(error.message);
            } finally {
                btnSalvar.disabled = false;
                btnSalvar.innerText = 'Enviar';
            }

        });

    </script>

</body>

</html>

    </script>

</body>

</html>
